name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            musl: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            musl: true
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify static linkage
        if: matrix.musl
        run: |
          bin="target/${{ matrix.target }}/release/starjj"
          file "$bin"
          ldd "$bin" && echo "WARN: binary is not fully static" || echo "OK: binary is statically linked"

      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/starjj"
          out="starjj-${{ matrix.target }}"
          tar -czf "${out}.tar.gz" -C "$(dirname "$bin")" starjj
          echo "asset=${out}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: starjj-${{ matrix.target }}
          path: ${{ env.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.asset }}

  notify-tap:
    name: bump homebrew tap
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger formula update
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          gh api repos/dfontana/homebrew-tap/dispatches \
            -f event_type=starjj-release \
            -F client_payload[tag]="${{ github.ref_name }}"
